<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="SignUp.css" />
    <title>Create A New Account</title>

    <!-- the icon in the browser tab -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2911/2911080.png" type="image/png">
  </head>

  <body>

    <!-- Background decoration -->
    <div id="BackgroundO">O</div>
    <div id="BackgroundX">X</div>

    <!-- back button to the LoginOrSignUp page -->
    <button id="BackButton" onclick="location.href='/website/pages/Start.html'">Back</button>

    <!-- Main white sign up box -->
    <div id="HeadersContainer">
      <h1 id="SignUpHeader">Create A New Account</h1>

      <input id="UsernameInput" type="text" minlength="3" maxlength="12" placeholder="Choose Your Username">

      <!-- password input with eye image -->
      <div class="PasswordInputContainer">
        <input id="PasswordInput" type="password" placeholder="Choose Your Password">
        <img id="PasswordEyeImg" class="EyeImg" src="../images/open_eye.png" draggable="false">
      </div>

      <!-- confirm password input with eye image -->
      <div class="PasswordInputContainer">
        <input id="ConfirmPasswordInput" type="password" placeholder="Confirm Your Password">
        <img id="ConfirmPasswordEyeImg" class="EyeImg" src="../images/open_eye.png" draggable="false">
      </div>

      <!-- Error message area -->
      <div id="ErrorDiv"></div>

      <!-- create account button -->
      <button id="CreateAccountButton">Create Account</button>

      <!-- Login text -->
      <p id="LoginText">
        Already have an account? <span id="LoginLink">Login</span>
      </p>
    </div>

    <script type="module" src="Signup.js"></script>
  </body>
</html>
